name: Daily Job Hunter

on:
  schedule:
    # Runs every morning at 7:00 AM Eastern (11:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run job hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python job_hunter.py

      - name: Save seen jobs
        run: |
          git config user.email "shernandez520@gmail.com"
          git config user.name "Job Hunter Bot"
          git add seen_jobs.json || true
          git diff --staged --quiet || git commit -m "Update seen jobs"
          git push || true
